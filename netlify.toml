# Netlify deploy config (alternative to vercel.json — same static output).
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Long-cache hashed build assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache the hero video(s)
[[headers]]
  for = "/*.webm"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=604800"
