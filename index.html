<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="./images/jas-logo.png" />
    <meta name="theme-color" content="#333D36" />

    <!-- ── Primary SEO ── -->
    <title>Just A Second | נותנים לחפצים חיים שניים</title>
    <meta
      name="description"
      content="Just A Second — המיזם הראשון בישראל לשימוש חוזר ומיחדוש. אוספים, מתקנים ומעצבים מחדש חפצים שהיו מושלכים, ומוכרים אותם בחנות הגלריה. עיצוב מעגלי, קהילה והשפעה חברתית-סביבתית."
    />
    <meta name="keywords" content="שימוש חוזר, מיחדוש, אפסייקלינג, קיימות, כלכלה מעגלית, עיצוב חברתי, גלריה, תל אביב, Just A Second" />
    <meta name="author" content="Just A Second" />
    <link rel="canonical" href="https://justasecond.co.il/" />

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="he_IL" />
    <meta property="og:site_name" content="Just A Second" />
    <meta property="og:title" content="Just A Second | נותנים לחפצים חיים שניים" />
    <meta
      property="og:description"
      content="המיזם הראשון בישראל לשימוש חוזר ומיחדוש — קיימות, עיצוב וקהילה. בואו לתת לחפצים חיים שניים."
    />
    <meta property="og:image" content="https://justasecond.co.il/images/hero_new.jpeg" />
    <meta property="og:url" content="https://justasecond.co.il/" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- ── Fonts: Heebo (UI) + Frank Ruhl Libre (editorial Hebrew serif) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- ── Structured data (Organization) ── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Just A Second",
        "alternateName": "ג'אסט א סקנד",
        "url": "https://justasecond.co.il",
        "logo": "https://justasecond.co.il/images/jas-logo.png",
        "description": "המיזם הראשון בישראל לשימוש חוזר ומיחדוש.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "מנחם בגין 34",
          "addressLocality": "תל אביב",
          "addressCountry": "IL"
        },
        "sameAs": ["https://instagram.com/justasecond.il"]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
